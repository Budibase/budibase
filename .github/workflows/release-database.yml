name: Release Database Image

concurrency:
  group: release-database
  cancel-in-progress: false

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      versioning:
        type: choice
        description: "Versioning type: minor or major"
        default: minor
        options:
          - minor
          - major
        required: true

jobs:
  tag-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag-release.outputs.version }}

    steps:
      - name: Fail if branch is not master
        if: github.ref != 'refs/heads/master'
        run: |
          echo "Ref is not master, you must run this job from master."
          exit 1

      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.RELEASE_KEY }}

      - run: cd scripts && yarn

      - name: Tag release
        id: tag-release
        run: |
          cd scripts
          git config --global user.name "Budibase Staging Release Bot"
          git config --global user.email "<>"
          BUMP_TYPE=${{ github.event.inputs.versioning }}
          ./versionDatabaseCommit.sh "$BUMP_TYPE"

          cd ..
          new_version=$(cat hosting/couchdb/VERSION | tr -d '[:space:]')
          echo "version=$new_version" >> $GITHUB_OUTPUT

  build-and-push:
    needs: [tag-release]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_API_KEY }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: hosting/couchdb
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            budibase/database:${{ needs.tag-release.outputs.version }}
            budibase/database:latest
