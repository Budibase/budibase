on:
  pull_request_target:
    types: [opened, reopened, synchronize]
  issue_comment:
    types: [created]

jobs:
  vouch-check:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: mitchellh/vouch/action/check-pr@f44860978966ace98fb11aaaa20f2b27d7543e13
        with:
          pr-number: ${{ github.event.pull_request.number }}
          require-vouch: false
          auto-close: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: mitchellh/vouch/action/check-user@f44860978966ace98fb11aaaa20f2b27d7543e13
        with:
          user: ${{ github.event.pull_request.user.login }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  manage:
    if: github.event_name == 'issue_comment' && github.event.issue.pull_request
    runs-on: ubuntu-latest
    concurrency:
      group: vouch-manage
      cancel-in-progress: false
    permissions:
      actions: write
      checks: read
      contents: write
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      - id: manage
        uses: mitchellh/vouch/action/manage-by-issue@f44860978966ace98fb11aaaa20f2b27d7543e13
        with:
          repo: ${{ github.repository }}
          issue-id: ${{ github.event.issue.number }}
          comment-id: ${{ github.event.comment.id }}
          vouch-keyword: vouch
          denounce-keyword: denounce
          allow-unvouch: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-run vouch check
        if: steps.manage.outputs.status == 'vouched' || steps.manage.outputs.status == 'denounced'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          head_sha=$(gh api "repos/$REPOSITORY/pulls/$PR_NUMBER" --jq '.head.sha')
          run_id=$(
            gh api "repos/$REPOSITORY/commits/$head_sha/check-runs" \
              --jq '[.check_runs[] | select(.name == "vouch-check" and .conclusion == "failure")] | sort_by(.started_at) | last | .details_url? | select(.) | capture("/actions/runs/(?<id>[0-9]+)").id'
          )

          if [ -n "$run_id" ]; then
            gh run rerun "$run_id" --failed --repo "$REPOSITORY"
          fi
