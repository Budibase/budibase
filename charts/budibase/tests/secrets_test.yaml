suite: secrets
templates:
  - templates/secrets.yaml
release:
  name: budibase
chart:
  version: 3.0.0
  appVersion: 3.0.0
tests:
  - it: should create secret when createSecrets is true
    set:
      globals.createSecrets: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret

  - it: should not create secret when createSecrets is false
    set:
      globals.createSecrets: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should be of type Opaque
    set:
      globals.createSecrets: true
    asserts:
      - equal:
          path: type
          value: Opaque

  - it: should contain all required keys
    set:
      globals.createSecrets: true
    asserts:
      - exists:
          path: data.internalApiKey
      - exists:
          path: data.jwtSecret
      - exists:
          path: data.objectStoreAccess
      - exists:
          path: data.objectStoreSecret
      - exists:
          path: data.bbEncryptionKey
      - exists:
          path: data.apiEncryptionKey
