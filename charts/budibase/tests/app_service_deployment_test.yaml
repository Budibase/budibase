suite: app-service deployment
templates:
  - templates/app-service-deployment.yaml
release:
  name: budibase
chart:
  version: 3.0.0
  appVersion: 3.0.0
tests:
  - it: should render default image from globals
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "budibase/apps:3.0.0"

  - it: should prepend dockerRegistry to default image
    set:
      globals.dockerRegistry: "registry.example.com/"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "registry.example.com/budibase/apps:3.0.0"

  - it: should use custom image when set
    set:
      services.apps.image: "my-registry.example.com/custom/apps:1.2.3"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "my-registry.example.com/custom/apps:1.2.3"

  - it: should prefer custom image over dockerRegistry
    set:
      globals.dockerRegistry: "registry.example.com/"
      services.apps.image: "my-registry.example.com/custom/apps:1.2.3"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "my-registry.example.com/custom/apps:1.2.3"

  - it: should not render securityContext by default
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].securityContext

  - it: should render securityContext when set
    set:
      services.apps.securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        readOnlyRootFilesystem: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 1000
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true

  - it: should be a Deployment
    asserts:
      - isKind:
          of: Deployment

  - it: should set correct replica count
    set:
      services.apps.replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should set correct container port
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 4002

  - it: should set imagePullPolicy to Always
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always

  - it: should set imagePullSecrets when configured
    set:
      imagePullSecrets:
        - name: my-pull-secret
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: my-pull-secret

  - it: should use appVersion override
    set:
      globals.appVersion: "2.5.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "budibase/apps:2.5.0"

  - it: should render extra env vars
    set:
      services.apps.extraEnv:
        - name: MY_VAR
          value: my-value
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MY_VAR
            value: "my-value"

  - it: should set APP_FEATURES when automation workers enabled
    set:
      services.automationWorkers.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: APP_FEATURES
            value: "api"
